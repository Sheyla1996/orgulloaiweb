server {
    listen 4001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /app.apk {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=app.apk";
        try_files /app.apk =404;
    }


    location / {
        try_files $uri $uri/ /index.html;
    }
}