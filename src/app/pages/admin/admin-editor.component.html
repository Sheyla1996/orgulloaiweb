<div class="admin-editor">
  <header class="admin-editor__header">
    <button mat-icon-button (click)="goBack()" aria-label="Volver">
      <mat-icon fontSet="material-symbols-outlined">arrow_back</mat-icon>
    </button>
    <h1>{{ title }}</h1>
  </header>

  @if (type === 'asociacion'){
    <section class="admin-editor__card">
      <input type="text" placeholder="Nombre" [(ngModel)]="asociacionForm.name" />
      <input type="text" placeholder="Nombre corto" [(ngModel)]="asociacionForm.shortName" />
      <input type="text" placeholder="Logo" [(ngModel)]="asociacionForm.logo" />
      <select [(ngModel)]="asociacionForm.zona">
        <option value="">Zona</option>
        @for (z of zonas; track $index) {
          <option [value]="z">{{ z | titlecase }}</option>
        }
      </select>
      <label class="check-row">
        <input type="checkbox" [(ngModel)]="asociacionForm.isBatucada" />
        Es batucada
      </label>
    </section>
  }

  @if (type === 'carroza') {
    <section class="admin-editor__card">
      <input type="text" placeholder="Nombre" [(ngModel)]="carrozaForm.name" />
      <input type="text" placeholder="Logo" [(ngModel)]="carrozaForm.logo" />
      <select [(ngModel)]="carrozaForm.zona">
        <option value="">Zona</option>
        @for (z of zonas; track $index) {
          <option [value]="z">{{ z | titlecase }}</option>
        }
      </select>
      <select [(ngModel)]="carrozaForm.status">
        <option value="">Estado</option>
        @for (st of carrozaStatusOptions; track $index) {
          <option [value]="st">{{ st | titlecase }}</option>
        }
      </select>
      <select [(ngModel)]="carrozaForm.size">
        <option value="">Tamaño</option>
        @for (sz of carrozaSizeOptions; track $index) {
          <option [value]="sz">{{ sz | titlecase }}</option>
        }
      </select>
    </section>
  }

  @if (type === 'telefono') {
    <section class="admin-editor__card">
      <input type="text" placeholder="Nombre" [(ngModel)]="telefonoForm.name" />
      <input type="text" placeholder="Telefono" [(ngModel)]="telefonoForm.telefono" />
      <select [(ngModel)]="telefonoForm.zona">
        <option value="">Zona</option>
        @for (z of zonas; track $index) {
          <option [value]="z">{{ z | titlecase }}</option>
        }
      </select>
    </section>
  }

  @if (type === 'whatsapp') {
    <section class="admin-editor__card">
      <select [(ngModel)]="whatsappForm.zona">
        <option value="">Zona</option>
        @for (z of zonas; track $index) {
          <option [value]="z">{{ z | titlecase }}</option>
        }
      </select>
      <input type="text" placeholder="Link de invitacion" [(ngModel)]="whatsappForm.link" />
    </section>
  }

  @if (type === 'pulsera'){
    <section class="admin-editor__card">
      <input type="text" placeholder="Descripcion (opcional)" [(ngModel)]="pulseraForm.description" />
      <input type="text" placeholder="UUID (opcional al crear)" [(ngModel)]="pulseraForm.uuid" [disabled]="!!idParam" />
      <select [(ngModel)]="pulseraForm.zona">
        <option value="">Zona</option>
        @for (z of zonas; track $index) {
          <option [value]="z">{{ z | titlecase }}</option>
        }
      </select>
      <select [(ngModel)]="pulseraForm.type">
        <option value="">Tipo</option>
        @for (t of typeOptions; track $index) {
          <option [value]="t">{{ t | titlecase }}</option>
        }
      </select>
      <input type="number" placeholder="Año" [(ngModel)]="pulseraForm.year"/>
    </section>
  }

  <div class="admin-editor__actions">
    <button mat-flat-button (click)="save()">Guardar</button>
    <button mat-stroked-button (click)="goBack()">Cancelar</button>
  </div>
</div>
